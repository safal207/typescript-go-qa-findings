name: QA checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compatibility-checks:
    name: Compatibility checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install dependencies
        run: npm install

      - name: Prepare result folders
        run: |
          mkdir -p results/ci
          mkdir -p results/benchmark
          mkdir -p results/performance
          mkdir -p results/profiles

      - name: Compare exit code behavior
        run: npm run compare:exit | tee results/ci/exit-code-noemit.txt
        continue-on-error: true

      - name: Compare noEmitOnError behavior
        run: npm run compare:noemit-on-error | tee results/ci/noemit-on-error.txt
        continue-on-error: true

      - name: Compare declaration emit behavior
        run: npm run compare:declaration-emit | tee results/ci/declaration-emit.txt
        continue-on-error: true

      - name: Compare project references behavior
        run: npm run compare:project-references | tee results/ci/project-references.txt
        continue-on-error: true

      - name: Compare tsconfig extends and paths behavior
        run: npm run compare:tsconfig-extends | tee results/ci/tsconfig-paths-extends.txt
        continue-on-error: true

      - name: Run benchmark checkers matrix
        run: npm run benchmark:checkers | tee results/benchmark/checkers-matrix.md
        continue-on-error: true

      - name: Run generated workload matrix
        env:
          BENCH_WARMUPS: 1
          BENCH_ITERATIONS: 3
          BENCH_CHECKERS: 1,2,4,8
        run: npm run benchmark:matrix

      - name: Capture TypeScript Go profiles
        env:
          PROFILE_WORKLOAD: few-large-files
          PROFILE_CHECKERS: 4
        run: npm run profile:tsgo

      - name: Upload QA outputs
        uses: actions/upload-artifact@v4
        with:
          name: qa-check-results
          path: |
            results/ci/*.txt
            results/benchmark/*.md
            results/performance/**/*.json
            results/performance/**/*.md
            results/profiles/**/*
